name: Otomatik Otoyol Fiyat Guncelleyici

on:
  schedule:
    # Her 3 gunde bir gece yarisi (00:00 UTC) calisir
    - cron: '0 0 */3 * *'
  # Isterseniz Actions sekmesinden manuel olarak tetikleyebilirsiniz
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Repoya commit atabilmesi icin gerekli izin
    
    steps:
      - name: Repoyu Cek (Checkout)
        uses: actions/checkout@v4

      - name: Python Ortamini Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Kutuphaneleri Yukle
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Scraper Scriptini Calistir
        run: python scraper/update_tolls.py

      - name: Degisiklikleri Kontrol Et ve Commit At
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Eger tolls.json degismisse bunu algilayip guncelleyecek
          git add tolls.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🚀 Otomatik Guncelleme: Otoyol Ucretleri Degisti" && git push)
