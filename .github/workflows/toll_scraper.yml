name: Otomatik Otoyol Fiyat Guncelleyici

env:
  # Node.js 24 çalışma ortamını zorunlu kılar (Haziran 2026 öncesi ve sonrası tam uyum)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      # Daha yeni Node ortamına sahip action-checkout v4 sürümü
      - name: Repoyu Cek (Checkout)
        uses: actions/checkout@v4.1.1

      # Node 24 destekleyen kararlı setup-python v5 sürümü
      - name: Python Ortamini Kur
        uses: actions/setup-python@v5.0.0
        with:
          python-version: '3.10'

      - name: Gerekli Kutuphaneleri Yukle
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Scraper Scriptini Calistir
        run: python scraper/update_tolls.py

      - name: Degisiklikleri Kontrol Et ve Commit At
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add tolls.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🚀 Otomatik Guncelleme: Otoyol Ucretleri Degisti" && git push)
