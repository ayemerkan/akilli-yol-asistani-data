name: Check Toll Rates Monthly

on:
  schedule:
    # TSİ her ayın 2'sinde saat 00:30'da çalışması için (Türkiye Saati = UTC + 3, yani UTC 1'inde 21:30)
    - cron: '30 21 1 * *'
  workflow_dispatch: # Manuel çalıştırmak için

jobs:
  check-tolls:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Dosyayı commit edip pushlamak için yazma izni

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pypdf

      - name: Run Tolls Scraper Script
        run: python update_tolls.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tolls.json
          git diff-index --quiet HEAD || (git commit -m "chore: update otoyol/bridge toll prices" && git push)
